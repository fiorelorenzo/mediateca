<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HLS Encoder</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #1A1B1E;
    --bg-elev: #141517;
    --panel: #25262B;
    --panel-2: #2C2E33;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.12);
    --fg: #C1C2C5;
    --fg-mute: #909296;
    --dim: #5C5F66;
    --accent: #4C6EF5;
    --accent-glow: rgba(76,110,245,0.22);
    --ok: #40C057;            /* mantine green.6 */
    --warn: #FAB005;          /* mantine yellow.6 */
    --err: #FA5252;           /* mantine red.6 */
    --copy: #22B8CF;          /* mantine cyan.5 */
    --shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 16px;
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(76,110,245,0.07), transparent 60%),
      radial-gradient(1000px 500px at -10% 110%, rgba(34,184,207,0.05), transparent 60%),
      var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    font-feature-settings: "tnum", "ss01", "cv11";
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
  }
  /* ---------- Inline icon (Lucide-style: 14px, 1.5 stroke) ---------- */
  .icon {
    width: 14px; height: 14px;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    flex-shrink: 0;
  }
  .stat .icon-corner {
    position: absolute;
    top: 10px;
    right: 12px;
    color: var(--dim);
    opacity: 0.6;
  }
  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand { display: flex; flex-direction: column; }
  .title { font-size: 14px; font-weight: 600; letter-spacing: 0.01em; }
  .subtitle { font-size: 11px; color: var(--dim); margin-top: 1px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--fg-mute);
  }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(64,192,87,0.6);
    animation: pulse 1.8s infinite;
  }
  .pulse.idle { background: var(--dim); animation: none; }
  .pulse.err { background: var(--err); animation: pulse-err 1s infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(64,192,87,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(64,192,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(64,192,87,0); }
  }
  @keyframes pulse-err {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  /* ---------- Section headers ---------- */
  h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 18px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  h2 .count {
    color: var(--fg-mute);
    background: var(--bg-elev);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  /* ---------- Stat grid ---------- */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    padding: 10px 12px;
    position: relative;
  }
  .stat .label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat .value {
    font-size: 22px;
    font-weight: 600;
    margin-top: 4px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat .value.ok { color: var(--ok); }
  .stat .value.err { color: var(--err); }
  /* ---------- Generic rows ---------- */
  .panel {
    padding: 10px 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
  }
  .row + .row { border-top: 1px dashed var(--border); }
  .row .label { color: var(--fg-mute); font-size: 11px; }
  .row .v { color: var(--fg); font-variant-numeric: tabular-nums; }
  .row .v.ok { color: var(--ok); }
  .row .v.warn { color: var(--warn); }
  .row .v.err { color: var(--err); }
  .row .v.dim { color: var(--dim); }
  /* ---------- Load block ---------- */
  .load-block {
    padding: 12px;
  }
  .load-now {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .load-now .num {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .load-now .num.ok   { color: var(--ok); }
  .load-now .num.warn { color: var(--warn); }
  .load-now .num.err  { color: var(--err); }
  .load-now .label-and-cap {
    display: flex; flex-direction: column; align-items: flex-end;
    color: var(--dim);
    font-size: 11px;
  }
  .load-now .label-and-cap .top {
    color: var(--fg-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
  }
  .load-bar {
    height: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    position: relative;
  }
  .load-bar > span {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--ok), var(--warn) 70%, var(--err));
    transition: width 0.6s ease-out;
  }
  .load-bar .marker {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 1px;
    background: rgba(255,255,255,0.18);
  }
  /* sparkline */
  .spark-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px;
    color: var(--dim);
    font-size: 10px;
  }
  .spark-row .legend {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .spark {
    flex: 1;
    height: 36px;
    width: 100%;
    display: block;
  }
  .spark .area  { fill: rgba(76,110,245,0.16); }
  .spark .line  { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
  .spark .grid  { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
  .spark .axis  { fill: var(--dim); font-size: 9px; }
  /* ---------- Items ---------- */
  .item {
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .item + .item { margin-top: 6px; }
  .item .head {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .item .name {
    color: var(--fg);
    font-weight: 500;
    overflow-wrap: anywhere;
    flex: 1 1 auto;
    min-width: 0;
  }
  .item .meta {
    color: var(--dim);
    font-size: 11px;
    margin-top: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow-wrap: anywhere;
  }
  .progress-bar {
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--copy));
    transition: width 1s linear;
  }
  .badge {
    display: inline-flex; align-items: center;
    height: 18px; padding: 0 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .badge.ok    { background: rgba(64,192,87,0.14);  color: var(--ok); }
  .badge.err   { background: rgba(250,82,82,0.14);  color: var(--err); }
  .badge.copy  { background: rgba(34,184,207,0.14); color: var(--copy); }
  .badge.muted { background: rgba(255,255,255,0.05); color: var(--fg-mute); }
  .empty {
    color: var(--dim); font-size: 11px; font-style: italic;
    padding: 10px 12px; text-align: center;
    border: 1px dashed var(--border); border-radius: 8px; margin-top: 8px;
  }
  footer {
    margin-top: 18px;
    padding-top: 12px;
    padding-bottom: 12px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--dim);
  }
  footer.error { color: var(--err); }
  @media (max-width: 520px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat .value { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="title">HLS Encoder</div>
    <div class="subtitle">Adaptive bitrate encoding pipeline</div>
  </div>
  <div class="status-pill" id="status-pill">
    <span class="pulse idle" id="pulse"></span>
    <span id="status-text">idle</span>
  </div>
</header>

<!-- Inline icon definitions reused via <use>. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-queue" viewBox="0 0 24 24">
      <path d="M3 6h13"/><path d="M3 12h13"/><path d="M3 18h13"/>
      <circle cx="20" cy="6" r="1.5"/><circle cx="20" cy="12" r="1.5"/><circle cx="20" cy="18" r="1.5"/>
    </symbol>
    <symbol id="i-cog" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4"/><path d="M12 16h.01"/>
    </symbol>
  </defs>
</svg>

<div class="stats-grid">
  <div class="stat card">
    <span class="icon-corner"><svg class="icon"><use href="#i-queue"/></svg></span>
    <div class="label">Queue</div>
    <div class="value" id="pending">—</div>
  </div>
  <div class="stat card">
    <span class="icon-corner"><svg class="icon"><use href="#i-cog"/></svg></span>
    <div class="label">Workers</div>
    <div class="value" id="workers">—</div>
  </div>
  <div class="stat card">
    <span class="icon-corner"><svg class="icon"><use href="#i-check"/></svg></span>
    <div class="label">Completed</div>
    <div class="value ok" id="done">0</div>
  </div>
  <div class="stat card">
    <span class="icon-corner"><svg class="icon"><use href="#i-alert"/></svg></span>
    <div class="label">Failed</div>
    <div class="value err" id="failed">0</div>
  </div>
</div>

<h2>In progress <span class="count" id="active-count">0</span></h2>
<div id="active-list"></div>

<h2>Encoder load</h2>
<div class="card load-block">
  <div class="load-now">
    <span class="num" id="cpu-num">—</span>
    <span class="label-and-cap">
      <span class="top">% of limit</span>
      <span id="cpu-cap">— cores max</span>
    </span>
  </div>
  <div class="load-bar"><span id="load-bar-fill" style="width:0%"></span></div>
  <div class="spark-row">
    <span class="legend">5 min</span>
    <svg class="spark" id="spark" viewBox="0 0 200 36" preserveAspectRatio="none">
      <path id="spark-area" class="area" d=""/>
      <path id="spark-line" class="line" d=""/>
    </svg>
  </div>
</div>

<h2>System</h2>
<div class="panel card">
  <div class="row"><span class="label">Cache free</span><span class="v" id="cache">—</span></div>
  <div class="row"><span class="label">Threads per job</span><span class="v dim" id="threads">—</span></div>
  <div class="row"><span class="label">Nice priority</span><span class="v dim" id="nice">—</span></div>
  <div class="row"><span class="label">Load gate</span><span class="v dim" id="gate">—</span></div>
  <div class="row"><span class="label">Host load 1m</span><span class="v dim" id="load1">—</span></div>
  <div class="row"><span class="label">Host load 5m</span><span class="v dim" id="load5">—</span></div>
</div>

<h2>Recent history <span class="count" id="history-count">0</span></h2>
<div id="history-list"></div>

<footer id="footer">
  <span id="footer-text">never updated</span>
  <span id="age">—</span>
</footer>

<script>
// How many cpu_percent samples to keep client-side for the sparkline.
// With a 5s tick this covers ~5 minutes of recent history.
const SPARK_LEN = 60;
const sparkData = [];

const fmt2 = (n) => typeof n === "number" ? n.toFixed(2) : "—";
const fmtTime = (sec) => {
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.round((sec % 3600) / 60);
    return `${h}h ${m}m`;
  }
  if (sec >= 60) return `${Math.floor(sec / 60)}m ${Math.round(sec % 60)}s`;
  return `${Math.round(sec)}s`;
};
const fmtRelative = (ts) => {
  const d = Math.max(0, Math.floor(Date.now() / 1000) - ts);
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d / 60)}m ago`;
  if (d < 86400) return `${Math.floor(d / 3600)}h ago`;
  return `${Math.floor(d / 86400)}d ago`;
};
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
));
const modeLabel = (m) => m === "copy1080" ? "copy 1080p" : "encode";
// Color buckets keyed against percentage of the encoder's CPU limit:
// <50% green (idle/light), 50-85 yellow (working), >85 red (saturated).
const cpuPctCls = (p) =>
  typeof p !== "number" || p < 0 ? "dim" :
  p < 50 ? "ok" :
  p < 85 ? "warn" : "err";

const parseSpeed = (line) => {
  const m = String(line || "").match(/speed=\s*([\d.]+)x/);
  return m ? parseFloat(m[1]) : null;
};
const parseTime = (line) => {
  const m = String(line || "").match(/time=(\d+):(\d+):([\d.]+)/);
  return m ? (+m[1] * 3600 + +m[2] * 60 + parseFloat(m[3])) : null;
};

function renderLoad(cpuPct, cpuLimit, load1, load5) {
  const num = document.getElementById("cpu-num");
  if (typeof cpuPct === "number") {
    num.textContent = cpuPct.toFixed(1) + "%";
    num.className = "num " + cpuPctCls(cpuPct);
  } else {
    num.textContent = "—";
    num.className = "num dim";
  }
  document.getElementById("cpu-cap").textContent = cpuLimit
    ? `${cpuLimit} cores max`
    : "no limit set";

  const pct = typeof cpuPct === "number" ? Math.max(0, Math.min(100, cpuPct)) : 0;
  document.getElementById("load-bar-fill").style.width = pct + "%";

  // Host load averages move to the smaller "Sistema" panel as ops detail.
  document.getElementById("load1").textContent = fmt2(load1);
  document.getElementById("load5").textContent = fmt2(load5);

  if (typeof cpuPct === "number") {
    sparkData.push(cpuPct);
    if (sparkData.length > SPARK_LEN) sparkData.shift();
  }
  renderSparkline();
}

function renderSparkline() {
  if (sparkData.length < 2) {
    document.getElementById("spark-line").setAttribute("d", "");
    document.getElementById("spark-area").setAttribute("d", "");
    return;
  }
  const W = 200, H = 36, pad = 1;
  // sparkData is in 0–100 percent space, so the y-axis is fixed.
  const max = 100;
  const dx = (W - pad * 2) / (SPARK_LEN - 1);
  // Right-align: newest sample at right edge.
  const offsetIndex = SPARK_LEN - sparkData.length;
  const points = sparkData.map((v, i) => {
    const x = pad + (offsetIndex + i) * dx;
    const y = H - pad - (v / max) * (H - pad * 2);
    return [x, y];
  });
  const line = points.map((p, i) =>
    (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)
  ).join(" ");
  const first = points[0], last = points[points.length - 1];
  const area = `M${first[0].toFixed(1)},${H - pad} ` + line.slice(1) +
               ` L${last[0].toFixed(1)},${H - pad} Z`;
  document.getElementById("spark-line").setAttribute("d", line);
  document.getElementById("spark-area").setAttribute("d", area);
}

function renderActive(active) {
  const el = document.getElementById("active-list");
  const entries = Object.entries(active || {});
  document.getElementById("active-count").textContent = entries.length;
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">no jobs in flight</div>';
    return;
  }
  const now = Math.floor(Date.now() / 1000);
  el.innerHTML = entries.map(([, info]) => {
    const elapsed = now - (info.started || now);
    const cls = info.mode === "copy1080" ? "copy" : "muted";
    const modeBadge = `<span class="badge ${cls}">${modeLabel(info.mode)}</span>`;
    const tDone = parseTime(info.progress);
    const speed = parseSpeed(info.progress);
    let pct = 0;
    if (tDone && info.duration) {
      pct = Math.min(100, Math.round(100 * tDone / info.duration));
    }
    const meta = (speed != null || tDone != null)
      ? `+${fmtTime(elapsed)} · ${tDone != null ? fmtTime(tDone) + "/" + fmtTime(info.duration || 0) : ""} ${speed != null ? "· " + speed.toFixed(2) + "×" : ""}`
      : `+${fmtTime(elapsed)} · starting…`;
    return `<div class="item">
      <div class="head">
        ${modeBadge}
        <span class="name">${escapeHtml(info.rel || "?")}</span>
      </div>
      <div class="progress-bar"><span style="width:${pct}%"></span></div>
      <div class="meta">${escapeHtml(meta)}</div>
    </div>`;
  }).join("");
}

function renderHistory(recent) {
  const el = document.getElementById("history-list");
  const items = (recent || []).slice(0, 8);
  document.getElementById("history-count").textContent = items.length;
  if (items.length === 0) {
    el.innerHTML = '<div class="empty">no recent jobs</div>';
    return;
  }
  el.innerHTML = items.map(j => {
    const ok = j.result === "ok";
    const resultBadge = ok
      ? '<span class="badge ok">ok</span>'
      : '<span class="badge err">error</span>';
    const modeBadge = j.mode === "copy1080"
      ? '<span class="badge copy">copy</span>'
      : '';
    let meta = "";
    if (ok && typeof j.duration === "number" && typeof j.encode_seconds === "number") {
      const speedStr = j.speed != null ? `${j.speed.toFixed(2)}×` : "";
      meta = `${fmtTime(j.duration)} → ${fmtTime(j.encode_seconds)}  ${speedStr}  · ${fmtRelative(j.ts)}`;
    } else if (!ok && j.error) {
      meta = `${j.error}  · ${fmtRelative(j.ts)}`;
    } else {
      meta = fmtRelative(j.ts);
    }
    return `<div class="item">
      <div class="head">
        ${resultBadge}
        ${modeBadge}
        <span class="name">${escapeHtml(j.rel || "?")}</span>
      </div>
      <div class="meta">${escapeHtml(meta)}</div>
    </div>`;
  }).join("");
}

function setStatus(label, cls) {
  document.getElementById("status-text").textContent = label;
  const p = document.getElementById("pulse");
  p.className = "pulse" + (cls ? " " + cls : "");
}

async function tick() {
  try {
    const r = await fetch("/status.json", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const s = await r.json();

    document.getElementById("pending").textContent = s.queue_pending ?? 0;
    document.getElementById("workers").textContent = s.workers ?? "—";
    document.getElementById("done").textContent = s.jobs_by_status?.done ?? 0;
    document.getElementById("failed").textContent = s.jobs_by_status?.failed ?? 0;

    // `host_load_avg` is the new key; fall back to `load_avg` for
    // older payloads while the encoder rolls out.
    const hostLoad = s.host_load_avg ?? s.load_avg ?? {};
    renderLoad(
      s.cpu_percent,
      s.cpu_limit,
      hostLoad["1m"],
      hostLoad["5m"],
    );

    const cacheGB = s.cache_free_gb;
    const cacheEl = document.getElementById("cache");
    cacheEl.textContent = typeof cacheGB === "number" ? cacheGB.toFixed(1) + " GB" : "—";
    cacheEl.className = "v " + (
      typeof cacheGB !== "number" ? "dim" :
      cacheGB < (s.cache_min_free_gb || 10) ? "err" :
      cacheGB < (s.cache_min_free_gb || 10) * 2 ? "warn" : "ok"
    );

    document.getElementById("threads").textContent = s.threads_per_job ?? "—";
    document.getElementById("nice").textContent = s.nice ?? "—";
    document.getElementById("gate").textContent =
      s.load_gate > 0
        ? (s.load_gate_blocking ? "BLOCKING" : "threshold " + s.load_gate)
        : "off";

    const active = s.active_jobs || {};
    const activeCount = Object.keys(active).length;
    if (activeCount > 0) {
      setStatus(`${activeCount} in progress`, null);
    } else if ((s.queue_pending || 0) > 0) {
      setStatus(`${s.queue_pending} queued`, "idle");
    } else {
      setStatus("idle", "idle");
    }

    renderActive(active);
    renderHistory(s.recent_jobs);

    document.getElementById("footer-text").textContent =
      "updated at " + new Date().toLocaleTimeString();
    document.getElementById("age").textContent = fmtRelative(s.ts);
    document.getElementById("footer").classList.remove("error");
  } catch (e) {
    setStatus("unreachable", "err");
    document.getElementById("footer-text").textContent = "error: " + e.message;
    document.getElementById("footer").classList.add("error");
  }
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>

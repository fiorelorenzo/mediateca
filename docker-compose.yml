# Servarr stack on Hetzner Cloud.
# On-server layout:
#   /opt/servarr/                   working dir, owner=$USERNAME
#     docker-compose.yml            this file
#     .env                          secrets — NEVER commit (gitignored)
#     config/                       per-container persistent state
#     caddy/                        Caddyfile + ACME data/config volumes
#     scripts/                      sidecar shell scripts
#   /mnt/storagebox/                Hetzner Storage Box mounted via CIFS
#     data/                         exposed inside containers as /data
#       torrents/tv/                qBit Sonarr category
#       torrents/movies/            qBit Radarr category
#       media/tv/                   Sonarr root folder
#       media/movies/               Radarr root folder
#
# Trash-guides layout: everything under one root means Sonarr/Radarr can
# hardlink imports from /data/torrents/... into /data/media/... instead of
# copying. Same filesystem, no double-disk-use.

networks:
  servarr:
    driver: bridge

services:
  # =========================================
  # Reverse proxy + automatic HTTPS
  # =========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - servarr

  # =========================================
  # VPN client (ProtonVPN) — shares its network namespace with qbittorrent
  # and qb-port-manager. All torrent traffic exits via the VPN tunnel; the
  # rest of the stack uses the direct Hetzner network.
  # =========================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - PORT_FORWARD_ONLY=on
      - FIREWALL_INPUT_PORTS=8080
      - FIREWALL_OUTBOUND_SUBNETS=172.18.0.0/16
      - DNS_KEEP_NAMESERVER=on
      - HEALTH_VPN_DURATION_INITIAL=120s
      - TZ=Europe/Rome
    volumes:
      - ./config/gluetun:/gluetun
    ports:
      - "8080"            # qBit WebUI (Caddy reaches it as gluetun:8080)
    networks:
      - servarr

  # =========================================
  # *arr stack (same as a local install, paths adapted for Storage Box)
  # =========================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/storagebox/data:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:nightly
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
    volumes:
      - ./config/prowlarr:/config
    networks:
      - servarr

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
    volumes:
      - ./config/sonarr:/config
      - /mnt/storagebox/data:/data
    networks:
      - servarr

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
    volumes:
      - ./config/radarr:/config
      - /mnt/storagebox/data:/data
    networks:
      - servarr

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
    volumes:
      - ./config/bazarr:/config
      - /mnt/storagebox/data:/data
    networks:
      - servarr

  # FlareSolverr is intentionally NOT in this compose. Running it on the
  # VPS (whether direct or behind Gluetun) means Cloudflare sees a
  # datacenter or VPN ASN and blocks it anyway. Instead it runs on a
  # residential machine (Mac/Linux/Windows/Raspberry Pi) and Prowlarr
  # reaches it over the private Tailscale/Headscale tailnet — see
  # README "Indexer proxy on a home node" section.
  #
  # BitMagnet + Postgres are also intentionally NOT here: the DHT crawler
  # saturated both vCPU cores of the CPX22 plan. Re-add only after scaling
  # to CPX32, or with cpus/mem limits applied.

  # Syncs qBittorrent's listening port with whatever NAT-PMP port Proton hands
  # out, every 60s. Reads /gluetun/forwarded_port, calls qBit WebUI API.
  qb-port-manager:
    image: alpine:latest
    container_name: qb-port-manager
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - qbittorrent
    volumes:
      - ./config/gluetun:/gluetun:ro
      - ./scripts/qb-port-update.sh:/qb-port-update.sh:ro
    environment:
      - INTERVAL=60
      - TZ=Europe/Rome
      - QBIT_USER=${QBIT_USER}
      - QBIT_PASS=${QBIT_PASS}
    command: sh -c "apk add --no-cache curl >/dev/null 2>&1 && /qb-port-update.sh"

  # =========================================
  # Streaming + requests + dashboard
  # =========================================
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Rome
      - JELLYFIN_PublishedServerUrl=https://media.${DOMAIN}
    volumes:
      - ./config/jellyfin:/config
      - /mnt/storagebox/data/media:/data
    networks:
      - servarr

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Rome
      - PORT=5055
    volumes:
      - ./config/seerr:/app/config
    networks:
      - servarr

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    volumes:
      - ./config/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - servarr

  # =========================================
  # Headscale — self-hosted Tailscale coordination server.
  # The VPS host (and remote nodes like Mac/Pi) join this tailnet via the
  # official Tailscale client pointed at https://headscale.${DOMAIN}.
  # Used to route Prowlarr's indexer scraping through a residential IP at
  # home (Cloudflare/datacenter blocks bypass).
  # =========================================
  headscale:
    image: headscale/headscale:0.26
    container_name: headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ./config/headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./config/headscale/data:/var/lib/headscale
    networks:
      - servarr

  # =========================================
  # Tdarr — asynchronous transcoding pipeline.
  # Re-encodes new imports to H.264 1080p + AAC stereo, keeping all
  # original audio tracks. Quality profiles cap at 1080p so Tdarr never
  # sees 4K. Encode happens on local NVMe (/temp); final result is
  # written back to the Storage Box via Tdarr's "Replace Original File"
  # plugin (atomic rename — file remains readable to Jellyfin during
  # encode, unavailable for ~1-2 s during the swap).
  # 4c/8t Xeon → 2 parallel FFmpeg workers without saturating the host.
  # =========================================
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    cpus: 4.0
    mem_limit: 12g
    environment:
      - TZ=Europe/Rome
      - PUID=${PUID}
      - PGID=${PGID}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - nodeName=tdarr-cloud01
      - ffmpegVersion=7
    volumes:
      - ./config/tdarr/server:/app/server
      - ./config/tdarr/configs:/app/configs
      - ./config/tdarr/logs:/app/logs
      - /mnt/storagebox/data/media:/media
      # Encode cache on the local NVMe RAID 1, NOT on the Storage Box:
      # SMB roundtrip per write would tank libx264 throughput.
      - /var/lib/tdarr-cache:/temp
    networks:
      - servarr

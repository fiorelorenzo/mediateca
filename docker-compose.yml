# Self-hosted media stack — works on any Linux host with Docker.
# Storage paths are configurable via .env:
#
#   MEDIA_DIR          host path exposed inside *arr/jellyfin/encoder containers
#                      as /data. Can be a local disk, NFS mount, CIFS mount, etc.
#                      Layout below MUST exist (created by setup-server.sh or
#                      manually):
#                        $MEDIA_DIR/torrents/tv/        qBit Sonarr category
#                        $MEDIA_DIR/torrents/movies/    qBit Radarr category
#                        $MEDIA_DIR/media/tv/           Sonarr root folder
#                        $MEDIA_DIR/media/movies/       Radarr root folder
#                      The "trash-guides layout": one root means Sonarr/Radarr
#                      hardlink imports from torrents/ into media/ instead of
#                      copying — same filesystem, no double-disk-use.
#   ENCODER_CACHE_DIR  host path mounted as /cache inside hls-encoder. Should
#                      be on FAST local storage (NVMe ideally) — libx264 will
#                      saturate it. Don't use the same backend as MEDIA_DIR if
#                      that's a network mount.
#
# Working directory layout (where you run `docker compose up`):
#   ./docker-compose.yml            this file
#   ./.env                          secrets — NEVER commit (gitignored)
#   ./config/                       per-container persistent state
#   ./caddy/                        Caddyfile + ACME data/config volumes
#   ./scripts/                      sidecar shell scripts

networks:
  servarr:
    driver: bridge

volumes:
  headscale-rendered:

services:
  # =========================================
  # Reverse proxy + automatic HTTPS
  # =========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      # Storage Box media tree exposed read-only to serve HLS segments
      # at hls.${DOMAIN}. Encoder writes here; Caddy only reads.
      - ${MEDIA_DIR}/media:/srv/hls:ro
      # hls-encoder status snapshot exposed at encoder-status.${DOMAIN}
      # (read-only) for Homarr / external monitoring.
      - ./config/hls-encoder:/srv/encoder-status:ro
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - servarr

  # =========================================
  # VPN client (ProtonVPN) — shares its network namespace with qbittorrent
  # and qb-port-manager. All torrent traffic exits via the VPN tunnel; the
  # rest of the stack uses the host's normal network.
  # =========================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - PORT_FORWARD_ONLY=on
      - FIREWALL_INPUT_PORTS=8080
      - FIREWALL_OUTBOUND_SUBNETS=172.18.0.0/16
      - DNS_KEEP_NAMESERVER=on
      - HEALTH_VPN_DURATION_INITIAL=120s
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/gluetun:/gluetun
    ports:
      - "8080"            # qBit WebUI (Caddy reaches it as gluetun:8080)
    networks:
      - servarr

  # =========================================
  # *arr stack — paths point to ${MEDIA_DIR} on the host (see top of file)
  # =========================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_DIR}:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:nightly
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/prowlarr:/config
    networks:
      - servarr

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_DIR}:/data
    networks:
      - servarr

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_DIR}:/data
    networks:
      - servarr

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/bazarr:/config
      - ${MEDIA_DIR}:/data
    networks:
      - servarr

  # FlareSolverr is intentionally NOT in this compose. Running it on the
  # server (whether direct or behind Gluetun) means Cloudflare sees a
  # datacenter or VPN ASN and blocks it anyway. Instead it runs on a
  # residential machine (Mac/Linux/Windows/Raspberry Pi) and Prowlarr
  # reaches it over the private Tailscale/Headscale tailnet — see
  # README "Indexer proxy on a home node" section.

  # Syncs qBittorrent's listening port with whatever NAT-PMP port Proton hands
  # out, every 60s. Reads /gluetun/forwarded_port, calls qBit WebUI API.
  qb-port-manager:
    image: alpine:latest
    container_name: qb-port-manager
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - qbittorrent
    volumes:
      - ./config/gluetun:/gluetun:ro
      - ./scripts/qb-port-update.sh:/qb-port-update.sh:ro
    environment:
      - INTERVAL=60
      - TZ=${TZ:-UTC}
      - QBIT_USER=${QBIT_USER}
      - QBIT_PASS=${QBIT_PASS}
    command: sh -c "apk add --no-cache curl >/dev/null 2>&1 && /qb-port-update.sh"

  # =========================================
  # Streaming + requests + dashboard
  # =========================================
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-UTC}
      - JELLYFIN_PublishedServerUrl=https://media.${DOMAIN}
    volumes:
      - ./config/jellyfin:/config
      - ${MEDIA_DIR}/media:/data
    networks:
      - servarr

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
      - PORT=5055
    volumes:
      - ./config/seerr:/app/config
    networks:
      - servarr

  # =========================================
  # nginx sidecar that wraps Seerr to inject a tiny client-side script
  # which removes target="_blank" from links pointing at media.${DOMAIN}.
  # Caddy points streaming.${DOMAIN} → this container → seerr.
  # See caddy/seerr-inject.conf for the why and what.
  # =========================================
  seerr-inject:
    image: nginx:alpine
    container_name: seerr-inject
    restart: unless-stopped
    depends_on:
      - seerr
    environment:
      # nginx:alpine's entrypoint runs envsubst on
      # /etc/nginx/templates/*.template at startup; the only variable
      # we substitute is JELLYFIN_HOST below.
      - JELLYFIN_HOST=media.${DOMAIN}
      # Limit envsubst to the variables we actually want; defends
      # against accidental substitution of unrelated env names.
      - NGINX_ENVSUBST_FILTER=^JELLYFIN_HOST$$
    volumes:
      - ./caddy/seerr-inject.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - servarr

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    volumes:
      - ./config/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - servarr

  # =========================================
  # Headscale — self-hosted Tailscale coordination server.
  # The VPS host (and remote nodes like Mac/Pi) join this tailnet via the
  # official Tailscale client pointed at https://headscale.${DOMAIN}.
  # Used to route Prowlarr's indexer scraping through a residential IP at
  # home (Cloudflare/datacenter blocks bypass).
  #
  # The official headscale image is distroless (no shell, no envsubst), so
  # the config template is rendered by a one-shot init container that
  # writes the resolved YAML to a shared named volume.
  # =========================================
  headscale-init:
    image: alpine:3
    container_name: headscale-init
    restart: "no"
    command: >
      sh -c "apk add --no-cache gettext >/dev/null &&
             envsubst '$$DOMAIN' < /template/config.yaml.template > /rendered/config.yaml"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./config/headscale/config.yaml.template:/template/config.yaml.template:ro
      - headscale-rendered:/rendered

  headscale:
    image: headscale/headscale:0.26
    container_name: headscale
    restart: unless-stopped
    command: serve
    depends_on:
      headscale-init:
        condition: service_completed_successfully
    volumes:
      - headscale-rendered:/etc/headscale:ro
      - ./config/headscale/data:/var/lib/headscale
    networks:
      - servarr

  # =========================================
  # hls-encoder — custom Python service that watches /data/media for
  # new video files dropped in by Sonarr/Radarr, encodes a 3-variant
  # H.264 ABR ladder + per-track AAC audio renditions as HLS, writes
  # a .strm pointing to the public CDN URL, and deletes the source.
  # See HLS_ABR_DESIGN.md for design + ./hls-encoder/ for the code.
  #
  # Resource sizing: cpus / mem_limit / WORKERS / THREADS below are
  # tuned for a 4c/8t host (e.g. Xeon E3-1275v6, Ryzen 5 5600). On
  # smaller boxes drop ENCODER_CPUS/ENCODER_MEM/WORKERS/THREADS in .env.
  # Rule of thumb: WORKERS × THREADS ≈ vCPU count. See the encoder
  # README "Tuning rule of thumb" section for details.
  # =========================================
  hls-encoder:
    build:
      context: ./hls-encoder
    image: hls-encoder:local
    container_name: hls-encoder
    restart: unless-stopped
    # We let the encoder reach all logical CPUs because `nice -n 10`
    # (applied to ffmpeg below) makes it yield to higher-priority work —
    # Jellyfin live transcode (rare), Caddy bursts, etc. cgroup CPU
    # throttling at exactly the host CPU count gives full throughput
    # when idle and graceful degradation when busy.
    cpus: ${ENCODER_CPUS:-8.0}
    mem_limit: ${ENCODER_MEM:-12g}
    environment:
      - TZ=${TZ:-UTC}
      - DOMAIN=${DOMAIN}
      - DATA_ROOT=/data
      - CACHE_ROOT=/cache
      - STATE_DB=/config/state.db
      # HLS_CDN_BASE auto-derives to https://hls.${DOMAIN} when DOMAIN
      # is set; uncomment to override.
      # - HLS_CDN_BASE=https://hls.${DOMAIN}
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      # CPU tuning — see hls-encoder/README.md "Tuning rule of thumb".
      # WORKERS × THREADS should ≈ vCPU count. Single-file workload uses
      # half the budget; batch (Sonarr/Radarr finishing several downloads
      # concurrently) saturates it.
      - WORKERS=${ENCODER_WORKERS:-2}
      - THREADS=${ENCODER_THREADS:-4}
      - NICE_LEVEL=${ENCODER_NICE:-10}
      - MAX_LOAD_AVG_1M=${ENCODER_MAX_LOAD_AVG_1M:-0}
      # Encoding ladder (kbps targets). maxrate auto = 1.1×, bufsize 2×.
      - BITRATE_1080P_KBPS=${BITRATE_1080P_KBPS:-5000}
      - BITRATE_720P_KBPS=${BITRATE_720P_KBPS:-2500}
      - BITRATE_480P_KBPS=${BITRATE_480P_KBPS:-1000}
      - LIBX264_PRESET=${LIBX264_PRESET:-fast}
      # Default audio rendition language (ISO-639-2). Empty = first track.
      - DEFAULT_AUDIO_LANG=${DEFAULT_AUDIO_LANG:-}
      - LOG_LEVEL=INFO
    volumes:
      - ${MEDIA_DIR}:/data
      # Encode scratch — should be FAST local storage (NVMe ideal). If
      # MEDIA_DIR is on a network mount, writing intermediate HLS segments
      # there directly would tank libx264 throughput. The encoder builds
      # the bundle here and atomically moves it to /data at the end.
      - ${ENCODER_CACHE_DIR}:/cache
      - ./config/hls-encoder:/config
    networks:
      - servarr
